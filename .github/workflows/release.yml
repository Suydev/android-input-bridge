name: Release

# Triggers:
#   1. Push a semver tag (v*) for a manual / planned release.
#   2. The "Android CI" workflow completes successfully on main — creates an
#      automatic pre-release so APKs are always available after every green build.

on:
  push:
    tags:
      - 'v*'
  workflow_run:
    workflows: ["Android CI"]
    types: [completed]
    branches: [main]

# Required to create releases and upload assets.
permissions:
  contents: write

env:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.caching=true"

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # Skip if this is an auto-release trigger but the CI did not succeed.
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success')

    steps:
      # ── Resolve the commit to build ─────────────────────────────────────────
      - name: Compute checkout ref
        id: ref
        run: |
          if [ "$GITHUB_EVENT_NAME" = "workflow_run" ]; then
            echo "sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=$GITHUB_SHA" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.ref.outputs.sha }}

      # ── Build environment ────────────────────────────────────────────────────
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: true

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # ── Debug APKs (always built) ────────────────────────────────────────────
      - name: Build Debug APKs
        run: ./gradlew :app-bridge:assembleDebug :app-receiver:assembleDebug --stacktrace

      # ── Release APKs (only when signing secrets are present) ─────────────────
      - name: Decode Keystore
        if: ${{ env.SIGNING_KEYSTORE_BASE64 != '' }}
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
        run: echo "$SIGNING_KEYSTORE_BASE64" | base64 --decode > release.jks

      - name: Build Release APKs
        if: ${{ env.SIGNING_KEYSTORE_BASE64 != '' }}
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
          SIGNING_KEYSTORE_PATH: ${{ github.workspace }}/release.jks
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
        run: ./gradlew :app-bridge:assembleRelease :app-receiver:assembleRelease --stacktrace

      # ── Release metadata ─────────────────────────────────────────────────────
      - name: Compute release metadata
        id: meta
        run: |
          if [ "$GITHUB_EVENT_NAME" = "push" ]; then
            # Tag push → proper versioned release
            TAG="$GITHUB_REF_NAME"
            PRERELEASE="false"
            LATEST="true"
          else
            # CI success on main → automatic pre-release
            RUN="${{ github.event.workflow_run.run_number }}"
            SHA="${{ github.event.workflow_run.head_sha }}"
            SHORT="${SHA:0:7}"
            TAG="build-${RUN}-${SHORT}"
            PRERELEASE="true"
            LATEST="false"
          fi
          echo "tag=${TAG}"       >> "$GITHUB_OUTPUT"
          echo "prerelease=${PRERELEASE}" >> "$GITHUB_OUTPUT"
          echo "latest=${LATEST}" >> "$GITHUB_OUTPUT"

      # ── GitHub Release ────────────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          prerelease: ${{ steps.meta.outputs.prerelease }}
          make_latest: ${{ steps.meta.outputs.latest }}
          generate_release_notes: true
          # Release APK globs are silently skipped when signing is not configured.
          fail_on_unmatched_files: false
          files: |
            app-bridge/build/outputs/apk/debug/app-bridge-debug.apk
            app-receiver/build/outputs/apk/debug/app-receiver-debug.apk
            app-bridge/build/outputs/apk/release/*.apk
            app-receiver/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
